<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 500px; height: 500px; overflow: hidden; background: #000; }
  .wrap {
    width: 500px; height: 500px; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 30% 40%, #1a1060 0%, #0a0820 40%, #000510 100%);
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 10%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 55%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 5%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 45%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 35%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 70%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 90%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 40%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 48% 92%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 38%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 18% 30%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 63% 18%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 82% 12%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 44% 66%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 97% 75%, #fff 0%, transparent 100%);
  }
  .glow {
    position: absolute;
    bottom: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 160px;
    background: radial-gradient(ellipse, rgba(255,140,0,0.35) 0%, transparent 70%);
    filter: blur(18px);
  }
  .glow2 {
    position: absolute;
    top: 30px; right: 30px;
    width: 120px; height: 120px;
    background: radial-gradient(ellipse, rgba(100,80,255,0.2) 0%, transparent 70%);
    filter: blur(20px);
  }
  .dog {
    position: absolute;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 420px;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="stars"></div>
    <div class="glow2"></div>
    <div class="glow"></div>
    <img class="dog" src="/shiba-cutout.png" />
  </div>
</body>
</html>
