kind = "web"
previewPath = "/"
title = "Asteroid Shiba Strategy — Presale"
version = "1.0.0"
id = "artifacts/asteroid-shiba-presale"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21783

[services.development]
run = "pnpm --filter @workspace/asteroid-shiba-presale run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asteroid-shiba-presale", "run", "build" ]
publicDir = "artifacts/asteroid-shiba-presale/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21783"
BASE_PATH = "/"
