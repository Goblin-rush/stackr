kind = "web"
previewPath = "/launchpad/"
title = "Bonding Curve Launchpad"
version = "1.0.0"
id = "artifacts/launchpad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/launchpad/" ]
localPort = 19433

[services.development]
run = "pnpm --filter @workspace/launchpad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/launchpad", "run", "build" ]
publicDir = "artifacts/launchpad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19433"
BASE_PATH = "/launchpad/"
